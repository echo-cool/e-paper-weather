; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[platformio]
default_envs = crowpanel_esp32s3_42_epaper
; default_envs = dfrobot_firebeetle2_esp32e
; default_envs = firebeetle32


; default options for each '[env:**]'
[env]
platform = espressif32 @ 6.6.0
framework = arduino
build_flags = '-Wall'
lib_deps =
  adafruit/Adafruit BME280 Library @ ^2.2.4
  adafruit/Adafruit BusIO @ ^1.15.0
  adafruit/Adafruit Unified Sensor @ ^1.1.14
  bblanchon/ArduinoJson @ ^7.0.4
  zinggjm/GxEPD2 @ ^1.5.6


[env:dfrobot_firebeetle2_esp32e]
board = dfrobot_firebeetle2_esp32e
monitor_speed = 115200
; override default partition table
; https://github.com/espressif/arduino-esp32/tree/master/tools/partitions
board_build.partitions = huge_app.csv
; change MCU frequency, 240MHz -> 80MHz (for better power efficiency)
board_build.f_cpu = 80000000L


[env:firebeetle32]
board = firebeetle32
monitor_speed = 115200
; override default partition table
; https://github.com/espressif/arduino-esp32/tree/master/tools/partitions
board_build.partitions = huge_app.csv
; change MCU frequency, 240MHz -> 80MHz (for better power efficiency)
board_build.f_cpu = 80000000L


; Elecrow CrowPanel 4.2" E-Paper (ESP32-S3-WROOM-1-N8R8, SSD1683, 400x300 B/W).
; Integrated board: e-paper is wired to fixed GPIOs. Runs always-on with OTA
; (no deep sleep), so it stays at the default 240MHz for WiFi/OTA responsiveness.
[env:crowpanel_esp32s3_42_epaper]
; pioarduino fork tracking Arduino-ESP32 core 3.x (IDF 5.x) — matches the
; environment the CrowPanel/GxEPD2 reference and the WorldClock project use.
; The default espressif32 6.6.0 (core 2.0.14) could not drive this panel.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
monitor_speed = 115200
; 8MB flash, dual-OTA partition layout (two ~3.3MB app slots) so OTA can flash
; the inactive slot. huge_app.csv has only one app slot and cannot do OTA.
board_upload.flash_size = 8MB
board_build.partitions = partitions_crowpanel_ota.csv
; N8R8 module: 8MB flash (QIO) + 8MB octal (OPI) PSRAM. Matches the reference
; CrowPanel board settings ("ESP32S3 Dev Module" + OPI PSRAM).
board_build.arduino.memory_type = qio_opi
; WiFiManager provides the captive-portal WiFi provisioning enabled below.
lib_deps =
  ${env.lib_deps}
  https://github.com/tzapu/WiFiManager.git#v2.0.17
build_flags =
  '-Wall'
  -DBOARD_HAS_PSRAM
  -DDISP_SSD1683
  -DDRIVER_CROWPANEL
  -DBOARD_CROWPANEL_S3
  ; Fall back to a WiFiManager captive portal when WiFi credentials fail, so the
  ; panel can be provisioned from a phone instead of a re-flash.
  -DENABLE_WIFI_PORTAL
  ; TLS plus the Open-Meteo forecast JSON parser needs more than Arduino's
  ; default 8KB loop-task stack on ESP32-S3.
  -DARDUINO_LOOP_STACK_SIZE=16384
  ; Current CrowPanels have a green circular sticker and use Elecrow's revised
  ; display controller/initialization sequence. Remove this flag only for the
  ; original board revision without the green sticker.
  -DCROWPANEL_GREEN_STICKER
; --- Over-the-air upload (after the first USB flash) ---
; Uncomment and set the device IP (shown on-screen / serial as "OTA ready") to
; upload wirelessly with `pio run -e crowpanel_esp32s3_42_epaper -t upload`:
; upload_protocol = espota
; upload_port = 192.168.0.xxx


; Original CrowPanel revision (no green circular sticker on the rear). It has
; the same ESP32-S3 and GPIO pinout but uses the original SSD1683 command set.
[env:crowpanel_esp32s3_42_epaper_legacy]
extends = env:crowpanel_esp32s3_42_epaper
build_unflags = -DCROWPANEL_GREEN_STICKER
